<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe - Full Game</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-mode="full">
  <nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand fw-bold" href="index.html">🎮 Tic Tac Toe</a>
    <div>
      <a class="btn btn-sm btn-outline-light" href="concept.html">Concept</a>
      <a class="btn btn-sm btn-outline-light" href="index.html">Full Game</a>
    </div>
  </nav>

  <main class="container py-4">
    <section class="row g-4 align-items-start">
      <div class="col-lg-7">
        <div class="card shadow-sm">
          <div class="card-body">
            <h1 class="h3 mb-3">Full Game Mode</h1>
            <p class="text-muted">Enter your name, start a round, and play against a simple AI.</p>

            <div class="row g-2">
              <div class="col-md-8">
                <input id="nameInput" class="form-control" placeholder="Enter your name">
              </div>
              <div class="col-md-4">
                <button class="btn btn-success w-100" onclick="startGame()">Start</button>
              </div>
            </div>
            <div class="mt-2">
              <button class="btn btn-outline-secondary btn-sm" onclick="guestMode()">Guest Mode</button>
              <button class="btn btn-outline-warning btn-sm" onclick="resetGame()">Reset</button>
              <button class="btn btn-outline-info btn-sm" onclick="hint()">Hint</button>
            </div>

            <h4 id="greeting" class="mt-4"></h4>
            <div id="board" class="board mt-3"></div>
            <h4 id="status" class="mt-3"></h4>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="card shadow-sm mb-3">
          <div class="card-body">
            <h5 class="card-title">Player Info</h5>
            <div id="userInfo" class="small text-muted"></div>
          </div>
        </div>

        <div class="card shadow-sm mb-3">
          <div class="card-body">
            <h5 class="card-title">Scoreboard</h5>
            <div id="scoreboard" class="small"></div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Leaderboard</h5>
            <ol id="leaderboard" class="mb-0 ps-3"></ol>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="modal fade" id="gameModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Game Over</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="modalText"></div>
        <div class="modal-footer">
          <button class="btn btn-primary" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center mt-5 p-3 bg-light">
    <a href="https://github.com/wesleycurtis/bravo-tic-tac-toe.git" target="_blank" rel="noreferrer">GitHub Repo</a> |
    <a href="https://wesleycurtis.github.io/wesleycurtis/" target="_blank" rel="noreferrer">GitHub Profile</a> |
    <a href="concept.html">Concept Mode</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
