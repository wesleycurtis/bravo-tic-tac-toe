<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe - Concept</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-mode="concept">
  <nav class="navbar navbar-dark bg-dark px-3 mb-3">
    <a class="navbar-brand fw-bold" href="concept.html">🧠 Concept Mode</a>
    <div>
      <a class="btn btn-sm btn-outline-light" href="concept.html">Concept</a>
      <a class="btn btn-sm btn-outline-light" href="index.html">Full Game</a>
    </div>
  </nav>

  <main class="container py-3">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h4">Super Simple Concept Version</h1>
        <p class="text-muted">This version is beginner-friendly: no AI, just turn-by-turn play with X and O.</p>

        <input id="nameInput" class="form-control" placeholder="Enter your name">
        <div class="mt-2">
          <button class="btn btn-success" onclick="startGame()">Start</button>
          <button class="btn btn-secondary" onclick="guestMode()">Guest</button>
          <button class="btn btn-outline-warning" onclick="resetGame()">Reset</button>
        </div>

        <h4 id="greeting" class="mt-4"></h4>
        <div id="board" class="board mt-3"></div>
        <h4 id="status" class="mt-3"></h4>
      </div>
    </div>
  </main>

  <div class="modal fade" id="gameModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Game Over</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="modalText"></div>
        <div class="modal-footer">
          <button class="btn btn-primary" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center mt-4 p-3 bg-light">
    <a href="https://github.com/wesleycurtis/bravo-tic-tac-toe.git" target="_blank" rel="noreferrer">GitHub Repo</a> |
    <a href="https://wesleycurtis.github.io/wesleycurtis/" target="_blank" rel="noreferrer">GitHub Profile</a> |
    <a href="index.html">Full Version</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
